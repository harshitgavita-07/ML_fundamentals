name: 🔥 Daily Streak Keeper

on:
  schedule:
    - cron: '30 14 * * *'   # 8:00 PM IST
  workflow_dispatch:

jobs:
  keep-streak:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Update streak log
        run: |
          echo "" >> STREAK_LOG.md
          echo "### $(date +%Y-%m-%d) ($(date +%A))" >> STREAK_LOG.md
          echo "- Active: ✅" >> STREAK_LOG.md
      - name: Commit
        run: |
          git config user.name "streak-bot"
          git config user.email "streak@github.com"
          git add STREAK_LOG.md
          git commit -m "streak: $(date +%Y-%m-%d) ✅" || echo "Nothing to commit"
          git push
